name: islami_app
description: "A complete Islamic companion app — Quran, Hadith, Azkar, Radio & Prayer Times."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.6
  introduction_screen: ^4.0.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  flutter_svg: ^2.0.10+1
  just_audio: ^0.9.40
  share_plus: ^10.0.2
  http: ^1.6.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  permission_handler: ^11.3.1
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/suras/
    - assets/hadeth/
    - assets/svg/
    - assets/data/

  fonts:
    - family: JannaLT
      fonts:
        - asset: assets/fonts/Janna LT Bold.ttf
          weight: 700
